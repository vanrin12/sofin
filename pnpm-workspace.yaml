# pnpm build-script approval (pnpm v11 uses `allowBuilds: { pkg: true|false }`).
# true  = run the package's install/build scripts; false = skip (no warning).
allowBuilds:
  # Prisma: needs its scripts to fetch/generate the query engine.
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  # Nx + native helpers (daemon, file watcher, module resolver).
  nx: true
  '@parcel/watcher': true
  unrs-resolver: true
  # Not needed for backend services.
  less: false
  '@nestjs/core': false
  '@scarf/scarf': false
  # Next.js (image optimization) + SWC native binaries for the web apps.
  sharp: true
  '@swc/core': true
